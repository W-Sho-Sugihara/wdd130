<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<body>
    
    <h1>HTML &amp; CSS Quiz</h1>

    <form action="#" method="post">
        <div>
            <label for="q1">1. What HTML tag is used to create a hyperlink?</label>
            <input type="text" id="q1" name="q1" placeholder="Enter the tag name" />
        </div>
        <div>
            <label for="q2">2. In your own words, explain the difference between a class selector and an ID selector in CSS.</label>
            <textarea id="q2" name="q2" rows="5" cols="50" placeholder="Write your answer here..."></textarea>
        </div>
        <div>
            <label for="q3">3. Which CSS property is used to change the text color of an element?</label>
            <select id="q3" name="q3">
            <option value="" selected disabled>Choose One ...</option>
            <option value="font-color">font-color</option>
            <option value="color">color</option>
            <option value="text-color">text-color</option>
            <option value="foreground-color">foreground-color</option>
            </select>
        </div>
        <div>
            <label for="q4">4. How many heading levels are available in HTML? (Enter a number)</label>
            <input type="number" id="q4" name="q4" min="1" max="20" />

        </div>
      <button type="submit">Submit Quiz</button>
    </form>

</body>
</html>
